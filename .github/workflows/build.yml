name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  ARTIFACT_NAME: Kantsusha

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      is_nightly: ${{ steps.check_type.outputs.is_nightly }}
    steps:
      - uses: actions/checkout@v4

      - name: Check build type
        id: check_type
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "is_nightly=true" >> $GITHUB_OUTPUT
          else
            echo "is_nightly=false" >> $GITHUB_OUTPUT
          fi

  build-linux:
    name: Build Linux Binary
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun --bun install --frozen-lockfile

      - name: Build
        run: bun --bun run build

      - name: Package artifacts
        run: |
          mkdir -p dist
          cp package.json dist/
          zip -r dist/${{ env.ARTIFACT_NAME }}-linux.zip build

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/*
          retention-days: 5

  build-docker:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ needs.setup.outputs.is_nightly == 'false' }}
            type=raw,value=nightly,enable=${{ needs.setup.outputs.is_nightly == 'true' }}
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Delete old nightly images
        if: needs.setup.outputs.is_nightly == 'true'
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ github.event.repository.name }}
          package-type: 'container'
          min-versions-to-keep: 5
          delete-only-untagged-versions: 'true'

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [setup, build-linux, build-docker]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Collect artifacts for release
        run: |
          mkdir -p uploads
          find dist -type f -exec cp {} uploads/ \;
          ls -lh uploads

      - name: Generate release notes
        id: notes
        run: |
          if [[ "${{ needs.setup.outputs.is_nightly }}" == "true" ]]; then
            PREV_TAG=$(git describe --tags --match "v*" --abbrev=0 2>/dev/null || echo "")
            echo "Previous stable tag: $PREV_TAG"
            TITLE="🌙 Nightly Release"
            TAG_NAME="nightly"
            IS_PRERELEASE="true"
            BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
            BODY="## Nightly Build\n\n**Built:** ${BUILD_TIME}\n\nChanges since $PREV_TAG:\n"
          else
            PREV_TAG=$(git describe --tags --match "v*" --abbrev=0 HEAD^ 2>/dev/null || echo "")
            echo "Previous tag: $PREV_TAG"
            TITLE="${{ github.ref_name }}"
            TAG_NAME="${{ github.ref_name }}"
            IS_PRERELEASE="false"
            BODY="## Changelog\n"
          fi

          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges)
          fi

          BODY="${BODY}\n${COMMITS}"

          echo "BODY<<EOF" >> $GITHUB_ENV
          echo -e "$BODY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "title=${TITLE}" >> $GITHUB_OUTPUT
          echo "prerelease=${IS_PRERELEASE}" >> $GITHUB_OUTPUT

      - name: Delete existing nightly release
        if: needs.setup.outputs.is_nightly == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete nightly --cleanup-tag -y || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag_name }}
          name: ${{ steps.notes.outputs.title }}
          body: ${{ env.BODY }}
          files: uploads/*
          prerelease: ${{ steps.notes.outputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
